name: Terraform CI - Pipeline Central

on:
  pull_request:
    branches:
      - main

jobs:

  analisis:
    name: Llamar analisis estatico y seguridad
    uses: ./.github/workflows/tflint-checkov.yaml
    with:
      path: terraform/

  validacion:
    name: Llamar validacion Terraform
    needs: analisis
    uses: ./.github/workflows/terraform-validate.yaml
    with:
      path: terraform/

  politicas:
    name: Llamar validacion politicas OPA
    needs: validacion
    uses: ./.github/workflows/opa-validation.yaml
    with:
      path: terraform/
      policies_path: policies/